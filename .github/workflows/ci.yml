name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          go install mvdan.cc/gofumpt@latest
          test -z "$(gofumpt -l .)" || (echo "Files need formatting:" && gofumpt -l . && exit 1)

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Build
        run: make build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: make test

  test-integration:
    name: Integration Tests (real tmux)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tmux
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Integration tests
        run: make test-integration
